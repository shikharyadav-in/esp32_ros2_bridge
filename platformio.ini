[env:esp32dev]
upload_speed = 115200
platform = espressif32
board = esp32dev
framework = arduino

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

board_microros_distro = humble
board_microros_transport = serial

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
